    <script>
        // Sort each table by points
        document.querySelectorAll('table').forEach(table => {
            const rows = Array.from(table.querySelectorAll('tr:nth-child(n+2)')); // Skip the header row
            rows.sort((a, b) => {
                const aPoints = parseInt(a.cells[6].textContent, 10) || 0; // Parse points for team A
                const bPoints = parseInt(b.cells[6].textContent, 10) || 0; // Parse points for team B
                return bPoints - aPoints; // Sort in descending order
            });
            rows.forEach(row => table.appendChild(row)); // Re-append sorted rows
        });
    </script>
